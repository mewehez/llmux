apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        rollme: "{{ .Values.rollme }}"
    spec:
      containers:
        - name: api
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: REDIS_URL
            - name: MODELS_CONFIG_PATH
              value: /config/models.json
          volumeMounts:
            - name: models-registry
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: models-registry
          configMap:
            name: llm-models
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
