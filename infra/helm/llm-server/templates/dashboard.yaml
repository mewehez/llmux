apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
      annotations:
        rollme: "{{ .Values.rollme }}"
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.images.dashboard }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 5173
          readinessProbe:
            httpGet: { path: /, port: 5173 }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet: { path: /, port: 5173 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  selector:
    app: dashboard
  ports:
    - port: 5173
      targetPort: 5173
