apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-nginx-conf
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      server {
        listen 80;
        location /api/ {
          proxy_pass http://api:8080/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Connection "";
          proxy_buffering off;
          proxy_cache off;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }
        location / {
          proxy_pass http://dashboard:5173;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
        - name: proxy
          image: {{ .Values.images.proxy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: nginx-conf
          configMap:
            name: proxy-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  labels:
    {{- include "llm-server.labels" . | nindent 4 }}
spec:
  selector:
    app: proxy
  ports:
    - port: 80
      targetPort: 80
      nodePort: {{ .Values.proxy.nodePort }}
  type: NodePort
