kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Reverse proxy is the ONLY exposed entrypoint. Dashboard at /,
      # API at /api/. All other services are ClusterIP-internal.
      - containerPort: 30080   # proxy
        hostPort: 30080
        protocol: TCP