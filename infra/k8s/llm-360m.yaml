apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-360m-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-360m
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-360m
  template:
    metadata:
      labels:
        app: llm-360m
    spec:
      initContainers:
        - name: model-downloader
          image: alpine:3.19
          env:
            - name: MODEL_FILE
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_MODEL_FILE
            - name: MODEL_URL
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_MODEL_URL
          command:
            - sh
            - -c
            - |
              if [ -f "/models/$MODEL_FILE" ]; then
                echo "Model already exists, skipping download."
              else
                echo "Downloading $MODEL_FILE..." &&
                wget -q -O "/models/$MODEL_FILE" "$MODEL_URL" &&
                echo "Download complete."
              fi
          volumeMounts:
            - name: models-360m
              mountPath: /models
      
      containers:
        - name: llm-360m
          image: ghcr.io/ggml-org/llama.cpp:server
          env:
            - name: LLM_MODEL_FILE
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_MODEL_FILE
            - name: LLM_CTX_SIZE
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_CTX_SIZE
            - name: LLM_THREADS
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_THREADS
            - name: LLM_PARALLEL
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_PARALLEL
            - name: LLM_THREADS_HTTP
              valueFrom:
                configMapKeyRef:
                  name: llm-args
                  key: LLM_360M_THREADS_HTTP
          resources:
            requests:
              cpu: "1"
              memory: "640Mi"
            limits:
              cpu: "4"
              memory: "1Gi"
          args:
            - --model
            - /models/$(LLM_MODEL_FILE)
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --ctx-size
            - $(LLM_CTX_SIZE)
            - --threads
            - $(LLM_THREADS)
            - --parallel
            - $(LLM_PARALLEL)
            - --threads-http
            - $(LLM_THREADS_HTTP)
            - --slots
            - --metrics
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: models-360m
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15

        # Sidecar: polls llama.cpp /slots on localhost and publishes
        # per-slot utilisation to Redis (key llm:slots:360m:{pod}).
        - name: slots-sidecar
          image: llm-server-worker:k8s
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          command: ["uv", "run", "python", "slots_sidecar.py"]
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: REDIS_URL
            - name: LLM_URL
              value: http://localhost:8080
            - name: MODEL_ID
              value: "360m"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

      volumes:
        - name: models-360m
          persistentVolumeClaim:
            claimName: models-360m-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: llm-360m
spec:
  selector:
    app: llm-360m
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

