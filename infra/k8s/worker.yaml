apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-135m
spec:
  selector:
    matchLabels:
      app: worker-135m
  template:
    metadata:
      labels:
        app: worker-135m
    spec:
      containers:
      - name: worker-135m
        image: llm-server-worker:k8s
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "1"
            memory: "192Mi"
        # MODEL_ID selects the registry entry (config/models.json, mounted at
        # /config); stream / consumer_group / concurrency are derived from it.
        # Only LLM_URL (topology) and REDIS_URL (secret) are set here.
        env:
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: llm-secrets
                key: REDIS_URL
          - name: MODELS_CONFIG_PATH
            value: /config/models.json
          - name: MODEL_ID
            value: "135m"
          - name: LLM_URL
            value: http://llm-135m:8080
        volumeMounts:
          - name: models-registry
            mountPath: /config
            readOnly: true
        # Consume-aware: the worker touches /tmp/worker_alive each heartbeat, so
        # these fail if the event loop stalls (not just if PID 1 dies).
        readinessProbe:
          exec:
            command: ["sh", "-c", "find /tmp/worker_alive -mmin -1 | grep -q ."]
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["sh", "-c", "find /tmp/worker_alive -mmin -1 | grep -q ."]
          initialDelaySeconds: 20
          periodSeconds: 15
      volumes:
        - name: models-registry
          configMap:
            name: llm-models

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benchmark-runner
  template:
    metadata:
      labels:
        app: benchmark-runner
    spec:
      containers:
      - name: benchmark-runner
        image: llm-server-worker:k8s
        imagePullPolicy: Never
        command: ["uv", "run", "python", "bench_worker.py"]
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "1"
            memory: "192Mi"
        env:
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: llm-secrets
                key: REDIS_URL
          - name: MODELS_CONFIG_PATH
            value: /config/models.json
        volumeMounts:
          - name: models-registry
            mountPath: /config
            readOnly: true
      volumes:
        - name: models-registry
          configMap:
            name: llm-models

