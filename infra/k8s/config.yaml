# Shared config + secrets referenced by api / worker / slots deployments.
#
# The model registry (config/models.json) is NOT inlined here — it's shipped as
# the `llm-models` ConfigMap, generated from the file at deploy time by
# deploy-k8s.sh so the JSON stays single-source. This file holds only what's
# hand-authored: secrets and (later) shared infra config.
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
type: Opaque
stringData:
  # Not truly sensitive in kind, but demonstrates the secretKeyRef pattern so
  # production can swap in a real managed Redis URL without touching manifests.
  REDIS_URL: redis://redis:6379/0
---
# Infra-layer llama.cpp tunables (the compose equivalent of root .env). Consumed
# by the llm-* deployments via env + $(VAR) substitution in their args, so the
# inference layer is env-driven in k8s too (no literals baked in the manifests).
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-args
data:
  LLM_135M_MODEL_FILE: SmolLM2-135M-Instruct-Q4_K_M.gguf
  LLM_135M_MODEL_URL:  https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf
  LLM_135M_CTX_SIZE:    "2048"
  LLM_135M_THREADS:     "4"
  LLM_135M_PARALLEL:    "4"
  LLM_135M_THREADS_HTTP: "8"   # bound concurrent HTTP handlers (= parallel + headroom for /health,/slots,/metrics)
  LLM_360M_MODEL_FILE: SmolLM2-360M-Instruct-Q4_K_M.gguf
  LLM_360M_MODEL_URL:  https://huggingface.co/bartowski/SmolLM2-360M-Instruct-GGUF/resolve/main/SmolLM2-360M-Instruct-Q4_K_M.gguf
  LLM_360M_CTX_SIZE:    "2048"
  LLM_360M_THREADS:     "4"
  LLM_360M_PARALLEL:    "4"
  LLM_360M_THREADS_HTTP: "8"
