apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: llm-server-api:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: STREAM_135M
              value: llm:work:135m
            - name: STREAM_360M
              value: llm:work:360m
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
  type: NodePort